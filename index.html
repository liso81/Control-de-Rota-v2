<div id="root"></div>
<script>
  window.__errors = [];
  function reportError(msg) {
    window.__errors.push(msg);
    var root = document.getElementById('root');
    if (root && root.children.length === 0) {
      root.innerHTML = '<div style="background:#171B1F;color:#F5A623;padding:20px;font-family:monospace;font-size:13px;white-space:pre-wrap;line-height:1.6;">⚠ Error al cargar la app:\n\n' + window.__errors.join('\n\n') + '</div>';
    }
  }
  window.addEventListener('error', function (e) {
    if (e.target && e.target.tagName === 'SCRIPT') {
      reportError('No cargó el script: ' + e.target.src);
    } else {
      reportError((e.message || 'Error desconocido') + (e.filename ? ' — ' + e.filename + ':' + e.lineno : ''));
    }
  }, true);
  window.addEventListener('unhandledrejection', function (e) {
    reportError('Promesa fallida: ' + (e.reason && (e.reason.message || e.reason)));
  });
  setTimeout(function () {
    var root = document.getElementById('root');
    if (root && root.children.length === 0 && window.__errors.length === 0) {
      reportError('La app tardó demasiado en cargar y no se detectó un error específico. Revisa tu conexión a internet.');
    }
  }, 8000);
</script>

function defaultCurrentDay() {

// Migra datos de la versión anterior (un solo camión) a la nueva estructura multi-camión
function normalize(d) {
  if (!d.trucks) {
    const legacy = {
      id: "truck1",
      nombre: "Camión 1",
      vehicle: d.vehicle || { matricula: "", indiceConsumo: "", capacidadTanque: "" },
      inventory: d.inventory || { litros: 0 },
      kmAcumulados: d.kmAcumulados || 0,
      currentDay: d.currentDay || defaultCurrentDay(),
      history: d.history || [],
      maintenance: d.maintenance || defaultMaintenance(),
    };
    d.trucks = [legacy];
    delete d.vehicle; delete d.inventory; delete d.kmAcumulados; delete d.currentDay; delete d.history; delete d.maintenance;
  }
  d.trucks.forEach(t => {
    t.maintenance = t.maintenance || defaultMaintenance();
    t.maintenance.tiposCatalogo = t.maintenance.tiposCatalogo || defaultTiposCatalogo();
    t.maintenance.registros = t.maintenance.registros || [];
    t.maintenance.neumaticos = t.maintenance.neumaticos || [];
    t.maintenance.bateria = t.maintenance.bateria || [];
    t.kmAcumulados = t.kmAcumulados || 0;
  });
  d.receivables = (d.receivables || []).map(r => ({ truckId: r.truckId || d.trucks[0]?.id, ...r }));
  d.finance = d.finance || { fondoCobertura: 0 };
  d.users = d.users && d.users.length ? d.users : [
    { id: "u-dueno", username: "dueno", password: "1234", role: "dueno", nombre: "Dueño" },
    { id: "u-chofer1", username: "chofer1", password: "1234", role: "chofer", nombre: "Chofer 1", truckId: d.trucks[0]?.id },
  ];
  return d;
}

function fmt(n) {
  return new Intl.NumberFormat("es-DO", { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n || 0);
}

async function loadData() {
  try {
    const { data, error } = await sb.from("app_state").select("data").eq("id", 1).single();
    if (error) throw error;
    if (data && data.data && Object.keys(data.data).length) return normalize(data.data);
  } catch (e) { console.error("Error cargando datos", e); }
  return normalize(defaultData());
}
async function saveData(data) {
  try { await sb.from("app_state").update({ data }).eq("id", 1); }
  catch (e) { console.error("Error guardando datos", e); }
}
function subscribeToChanges(onChange) {
  const channel = sb.channel("app_state_changes").on(
    "postgres_changes",
    { event: "UPDATE", schema: "public", table: "app_state" },
    (payload) => { if (payload.new && payload.new.data) onChange(normalize(payload.new.data)); }
  ).subscribe();
  return () => sb.removeChannel(channel);
}

// ---------- UI PRIMITIVES ----------
function GaugeBar({ pct, label, sub }) {
  const clamped = Math.max(0, Math.min(100, pct));
  return (
    <div className="w-full">
      <div className="flex items-baseline justify-between mb-1">
        <span className="text-[11px] uppercase tracking-widest text-[#8B95A1] font-medium">{label}</span>
        <span className="text-[11px] text-[#8B95A1] font-mono">{sub}</span>
      </div>
      <div className="relative h-3 rounded-sm bg-[#141A1F] overflow-hidden border border-[#2A323A]">
        <div className="h-full transition-all duration-500" style={{
          width: `${clamped}%`,
          background: clamped < 20 ? "linear-gradient(90deg,#D14B3D,#E8622C)" : "linear-gradient(90deg,#2E6E8E,#F5A623)",
        }} />
        {[20, 40, 60, 80].map((t) => <div key={t} className="absolute top-0 bottom-0 w-px bg-[#0E1216]/60" style={{ left: `${t}%` }} />)}
      </div>
    </div>
  );
}
function Card({ children, className = "" }) {
  return <div className={`bg-[#1E252B] border border-[#2A323A] rounded-md p-4 ${className}`}>{children}</div>;
}
function Field({ label, children }) {
  return (
    <label className="block mb-3">

      {children}

}
const inputCls = "w-full bg-[#141A1F] border border-[#2A323A] rounded-sm px-3 py-2.5 text-[#ECE9E2] font-mono text-[15px] focus:outline-none focus:ring-2 focus:ring-[#F5A623] focus:border-transparent placeholder:text-[#5A6570]";
const inputSmCls = "w-full bg-[#0F1418] border border-[#2A323A] rounded-sm px-2.5 py-2 text-[#ECE9E2] font-mono text-sm focus:outline-none focus:ring-2 focus:ring-[#F5A623] focus:border-transparent placeholder:text-[#5A6570]";

function Button({ children, onClick, variant = "primary", disabled, className = "" }) {
  const styles = {
    primary: "bg-[#F5A623] text-[#171B1F] hover:brightness-110",
    secondary: "bg-[#2E6E8E] text-white hover:brightness-110",
    ghost: "bg-transparent border border-[#2A323A] text-[#ECE9E2] hover:bg-[#252C33]",
    danger: "bg-[#D14B3D] text-white hover:brightness-110",

  return (
    <button onClick={onClick} disabled={disabled}
      className={`px-4 py-2.5 rounded-sm font-semibold text-sm tracking-wide transition disabled:opacity-40 disabled:cursor-not-allowed ${styles[variant]} ${className}`}>
      {children}
    </button>

}
function Toast({ msg }) {
  if (!msg) return null;
  return (
    <div className="fixed bottom-5 left-1/2 -translate-x-1/2 bg-[#4C8C5B] text-white px-4 py-2.5 rounded-sm text-sm font-medium shadow-lg z-50 flex items-center gap-2 max-w-[90vw] text-center">
      <Check size={16} className="shrink-0" /> {msg}
    </div>
  );
}
function Row({ label, value, bold, muted }) {
  const isNeg = value < 0;
  const color = isNeg ? "text-[#D14B3D]" : bold ? "text-[#F5A623]" : "text-[#ECE9E2]";
  return (
    <div className="flex justify-between items-center py-1">

      <span className={`font-mono text-sm ${bold ? "text-lg font-bold" : ""} ${color}`}>{isNeg ? "-" : ""}{fmt(Math.abs(value))}</span>
    </div>

}
function PercentRow({ label, value, bold }) {

  const color = isNeg ? "text-[#D14B3D]" : bold ? "text-[#F5A623]" : "text-[#ECE9E2]";

  const submit = () => {
    const u = data.users.find(x => x.username === username.trim() && x.password === password);
    if (!u) { setError("Usuario o contraseña incorrectos"); return; }
    onLogin(u);
  };

  return (
    <div className="min-h-screen bg-[#171B1F] text-[#ECE9E2] flex items-center justify-center px-4" style={{ fontFamily: "'Inter', sans-serif" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap'); .font-mono{font-family:'IBM Plex Mono',monospace;}`}</style>

// ---------- CHOFER ----------
function PanelChofer({ truck, truckId, mutate, toast, currentUser }) {
  const [tab, setTab] = useState("resumen");
  const litros = truck.inventory.litros;
  const cap = Number(truck.vehicle.capacidadTanque) || 0;
  const pct = cap > 0 ? (litros / cap) * 100 : 0;
  const day = truck.currentDay;
  const totalVentasEfectivo = day.ventas.reduce((a, v) => a + Number(v.efectivo || 0), 0);
  const totalVentasTodas = day.ventas.reduce((a, v) => a + Number(v.efectivo || 0) + Number(v.transferencia || 0) + Number(v.credito || 0), 0);
  const totalCompras = day.compras.reduce((a, c) => a + Number(c.valor), 0);
  const totalGastos = day.gastos.reduce((a, g) => a + Number(g.monto), 0);
  const efectivoDisponible = day.saldoInicial + totalVentasEfectivo - totalCompras - totalGastos;

  const tabs = [
    { id: "resumen", label: "Resumen", icon: ClipboardList },
    { id: "compras", label: "Compras", icon: Fuel },
    { id: "ventas", label: "Ventas", icon: TrendingUp },
    { id: "gastos", label: "Gastos", icon: Wallet },
  ];

  return (
    <div className="max-w-md mx-auto pb-24">
      <Card className="mb-4"><GaugeBar pct={pct} label="Agua en existencia" sub={`${fmt(litros)} L / ${fmt(cap)} L`} /></Card>
      <div className="grid grid-cols-4 gap-1.5 mb-4">
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)}
            className={`flex flex-col items-center gap-1 py-2.5 rounded-sm text-[11px] font-medium tracking-wide transition ${tab === t.id ? "bg-[#F5A623] text-[#171B1F]" : "bg-[#1E252B] text-[#8B95A1] border border-[#2A323A]"}`}>
            <t.icon size={16} />{t.label}
          </button>
        ))}
      </div>
      {tab === "resumen" && (
        <div className="space-y-3">
          <Card>
            <div className="text-[11px] uppercase tracking-widest text-[#8B95A1] mb-3 font-medium">Día — {day.fecha}</div>
            <Row label="Saldo inicial" value={day.saldoInicial} />
            <Row label="Ventas en efectivo" value={totalVentasEfectivo} />
            <Row label="Ventas totales (todas)" value={totalVentasTodas} muted />
            <Row label="Compras" value={-totalCompras} />
            <Row label="Otros gastos" value={-totalGastos} />
            <div className="h-px bg-[#2A323A] my-2" />
            <Row label="Efectivo disponible" value={efectivoDisponible} bold />
          </Card>
          <CierreDia efectivoDisponible={efectivoDisponible} truckId={truckId} mutate={mutate} toast={toast} currentUser={currentUser} />
        </div>
      )}
      {tab === "compras" && <TabCompras truck={truck} truckId={truckId} mutate={mutate} toast={toast} />}
      {tab === "ventas" && <TabVentas truck={truck} truckId={truckId} mutate={mutate} toast={toast} />}
      {tab === "gastos" && <TabGastos truck={truck} truckId={truckId} mutate={mutate} toast={toast} />}
    </div>
  );
}

function CierreDia({ efectivoDisponible, truckId, mutate, toast, currentUser }) {
  const [entregado, setEntregado] = useState("");
  const [confirming, setConfirming] = useState(false);
  const remanente = efectivoDisponible - (Number(entregado) || 0);

  const cerrar = () => {
    mutate(d => {
      const t = d.trucks.find(x => x.id === truckId);
      const closed = {
        ...t.currentDay, entregadoAlDueno: Number(entregado) || 0, efectivoDisponible,
        choferNombre: currentUser?.nombre || null, choferUsername: currentUser?.username || null,
        cerradoTs: Date.now(),
      };
      t.history.unshift(closed);
      t.currentDay = { fecha: today(), saldoInicial: remanente, compras: [], ventas: [], gastos: [] };
    });
    toast("Día cerrado y liquidado");
    setConfirming(false); setEntregado("");
  };

  return (
    <Card>
      <div className="text-[11px] uppercase tracking-widest text-[#8B95A1] mb-3 font-medium">Cerrar día / Liquidar</div>
      <Field label="Efectivo entregado al dueño">
        <input type="number" className={inputCls} value={entregado} onChange={e => setEntregado(e.target.value)} placeholder="0.00" />
      </Field>
      <Row label="Remanente (pasa a mañana)" value={remanente} />
      {!confirming ? <Button className="w-full mt-3" onClick={() => setConfirming(true)}>Cerrar día</Button> : (
        <div className="flex gap-2 mt-3">
          <Button variant="ghost" className="flex-1" onClick={() => setConfirming(false)}>Cancelar</Button>
          <Button variant="danger" className="flex-1" onClick={cerrar}>Confirmar cierre</Button>
        </div>
      )}
    </Card>
  );
}

function TabCompras({ truck, truckId, mutate, toast }) {
  const [aguaValor, setAguaValor] = useState("");
  const [gasoleoCant, setGasoleoCant] = useState("");
  const [gasoleoPrecio, setGasoleoPrecio] = useState("");
  const [editId, setEditId] = useState(null);

  const addAgua = () => {
    if (!aguaValor) { toast("Ingresa el valor de la compra"); return; }
    const cap = Number(truck.vehicle.capacidadTanque) || 0;
    if (cap <= 0) { toast("Configura la capacidad del tanque en Dueño → Vehículo primero"); return; }
    mutate(d => {
      const t = d.trucks.find(x => x.id === truckId);
      t.currentDay.compras.push({ id: makeId(), tipo: "agua", valor: Number(aguaValor), litrosAntes: t.inventory.litros, ts: Date.now() });
      t.inventory.litros = cap;
    });
    setAguaValor(""); toast("Compra de agua registrada — tanque lleno");
  };
  const addGasoleo = () => {
    if (!gasoleoCant || !gasoleoPrecio) { toast("Ingresa cantidad y precio"); return; }
    mutate(d => {
      const t = d.trucks.find(x => x.id === truckId);
      t.currentDay.compras.push({ id: makeId(), tipo: "gasoleo", cantidad: Number(gasoleoCant), valor: Number(gasoleoPrecio), ts: Date.now() });
      const indice = Number(t.vehicle.indiceConsumo) || 0;
      t.kmAcumulados = (t.kmAcumulados || 0) + Number(gasoleoCant) * indice;
    });
    setGasoleoCant(""); setGasoleoPrecio(""); toast("Compra de gasóleo registrada");
  };
  const deleteCompra = (item) => {
    mutate(d => {
      const t = d.trucks.find(x => x.id === truckId);
      t.currentDay.compras = t.currentDay.compras.filter(c => c.id !== item.id);
      if (item.tipo === "agua" && typeof item.litrosAntes === "number") t.inventory.litros = item.litrosAntes;
      if (item.tipo === "gasoleo") {
        const indice = Number(t.vehicle.indiceConsumo) || 0;
        t.kmAcumulados = (t.kmAcumulados || 0) - Number(item.cantidad) * indice;
      }
    });
    toast("Compra eliminada");
  };

  return (
    <div className="space-y-3">
      <Card>
        <div className="flex items-center gap-2 mb-3"><Droplet size={16} className="text-[#2E6E8E]" /><span className="text-sm font-semibold">Agua</span></div>
        <Field label="Valor de la compra"><input type="number" className={inputCls} value={aguaValor} onChange={e => setAguaValor(e.target.value)} placeholder="0.00" /></Field>
        <Button className="w-full" onClick={addAgua}>Registrar compra de agua</Button>
      </Card>
      <Card>
        <div className="flex items-center gap-2 mb-3"><Fuel size={16} className="text-[#F5A623]" /><span className="text-sm font-semibold">Gasóleo (diésel)</span></div>
        <Field label="Cantidad (litros)"><input type="number" className={inputCls} value={gasoleoCant} onChange={e => setGasoleoCant(e.target.value)} placeholder="0" /></Field>
        <Field label="Precio total"><input type="number" className={inputCls} value={gasoleoPrecio} onChange={e => setGasoleoPrecio(e.target.value)} placeholder="0.00" /></Field>
        <Button className="w-full" onClick={addGasoleo}>Registrar compra de gasóleo</Button>
      </Card>
      {truck.currentDay.compras.length === 0 ? <div className="text-center text-[#5A6570] text-sm py-4">Sin registros hoy</div> : (
        <Card>
          <div className="text-[11px] uppercase tracking-widest text-[#8B95A1] mb-2 font-medium">Registrado hoy</div>
          {[...truck.currentDay.compras].reverse().map(item => (
            editId === item.id
              ? <CompraEditForm key={item.id} item={item} truckId={truckId} mutate={mutate} toast={toast} onDone={() => setEditId(null)} />
              : <ItemRow key={item.id} onEdit={() => setEditId(item.id)} onDelete={() => deleteCompra(item)}>
                  <span className="text-sm text-[#ADB4BC] font-mono">
                    {item.tipo === "agua" ? `Agua — $${fmt(item.valor)} (tanque lleno)` : `Gasóleo — ${fmt(item.cantidad)} L — $${fmt(item.valor)}`}
                  </span>
                </ItemRow>
          ))}
        </Card>
      )}
    </div>
  );
}

function CompraEditForm({ item, truckId, mutate, toast, onDone }) {
  const [valor, setValor] = useState(item.valor);
  const [cantidad, setCantidad] = useState(item.cantidad || "");
  const guardar = () => {
    mutate(d => {
      const t = d.trucks.find(x => x.id === truckId);
      const c = t.currentDay.compras.find(x => x.id === item.id);
      if (!c) return;
      c.valor = Number(valor);
      if (c.tipo === "gasoleo") {
        const nuevaCantidad = Number(cantidad);
        const indice = Number(t.vehicle.indiceConsumo) || 0;
        t.kmAcumulados = (t.kmAcumulados || 0) + (nuevaCantidad - c.cantidad) * indice;
        c.cantidad = nuevaCantidad;
      }
    });
    toast("Compra actualizada"); onDone();
  };
  return (
    <div className="pb-2 mb-2 border-b border-[#2A323A] last:border-0">
      <div className="grid grid-cols-2 gap-2 mb-2">
        {item.tipo === "gasoleo" && (<div><span className="block text-[10px] uppercase text-[#8B95A1] mb-1">Cantidad (L)</span><input type="number" className={inputSmCls} value={cantidad} onChange={e => setCantidad(e.target.value)} /></div>)}
        <div><span className="block text-[10px] uppercase text-[#8B95A1] mb-1">Valor</span><input type="number" className={inputSmCls} value={valor} onChange={e => setValor(e.target.value)} /></div>
      </div>
      <div className="flex gap-2"><Button variant="ghost" className="flex-1 !py-1.5 !text-xs" onClick={onDone}>Cancelar</Button><Button className="flex-1 !py-1.5 !text-xs" onClick={guardar}>Guardar</Button></div>
    </div>
  );
}

function TabVentas({ truck, truckId, mutate, toast }) {
  const [litros, setLitros] = useState("");
  const [efectivo, setEfectivo] = useState("");
  const [transferencia, setTransferencia] = useState("");
  const [credito, setCredito] = useState("");
  const [cliente, setCliente] = useState("");
  const [editId, setEditId] = useState(null);
  const disponible = truck.inventory.litros;
  const totalImporte = (Number(efectivo) || 0) + (Number(transferencia) || 0) + (Number(credito) || 0);

  const addVenta = () => {
    if (litros === "" || Number(litros) <= 0) { toast("Ingresa los litros vendidos"); return; }
    if (totalImporte <= 0) { toast("Ingresa al menos un monto de pago"); return; }
    if (Number(credito) > 0 && !cliente.trim()) { toast("Falta el nombre del cliente para la parte a crédito"); return; }
    if (disponible <= 0) { toast("No hay agua en existencia. Ve a Dueño → Vehículo, o registra una compra de agua"); return; }
    if (Number(litros) > disponible) { toast(`Solo hay ${fmt(disponible)} L en existencia`); return; }
    const ts = Date.now(); const id = makeId();
    mutate(d => {
      const t = d.trucks.find(x => x.id === truckId);
      t.currentDay.ventas.push({ id, litros: Number(litros), efectivo: Number(efectivo) || 0, transferencia: Number(transferencia) || 0, credito: Number(credito) || 0, cliente: Number(credito) > 0 ? cliente.trim() : null, ts });
      t.inventory.litros -= Number(litros);
      if (Number(credito) > 0) d.receivables.push({ id: makeId(), truckId, sourceTs: ts, cliente: cliente.trim(), monto: Number(credito), fecha: t.currentDay.fecha, pagado: false });
    });
    setLitros(""); setEfectivo(""); setTransferencia(""); setCredito(""); setCliente("");
    toast("Venta registrada");
  };
  const deleteVenta = (item) => {
    mutate(d => {
      const t = d.trucks.find(x => x.id === truckId);
      t.currentDay.ventas = t.currentDay.ventas.filter(v => v.id !== item.id);
      t.inventory.litros += item.litros;
      d.receivables = d.receivables.filter(r => r.sourceTs !== item.ts);
    });
    toast("Venta eliminada");
  };

  return (
    <div className="space-y-3">
      <Card>
        <Field label="Litros vendidos"><input type="number" className={inputCls} value={litros} onChange={e => setLitros(e.target.value)} placeholder="0" /></Field>
        <div className="text-[11px] uppercase tracking-widest text-[#8B95A1] font-medium mb-1.5">Pago (se puede dividir)</div>
        <div className="grid grid-cols-3 gap-2 mb-3">
          <div><span className="block text-[10px] uppercase text-[#8B95A1] mb-1">Efectivo</span><input type="number" className={inputSmCls} value={efectivo} onChange={e => setEfectivo(e.target.value)} placeholder="0.00" /></div>
          <div><span className="block text-[10px] uppercase text-[#8B95A1] mb-1">Transferencia</span><input type="number" className={inputSmCls} value={transferencia} onChange={e => setTransferencia(e.target.value)} placeholder="0.00" /></div>
          <div><span className="block text-[10px] uppercase text-[#8B95A1] mb-1">Crédito</span><input type="number" className={inputSmCls} value={credito} onChange={e => setCredito(e.target.value)} placeholder="0.00" /></div>
        </div>
        {Number(credito) > 0 && <Field label="Nombre del cliente (crédito)"><input type="text" className={inputCls} value={cliente} onChange={e => setCliente(e.target.value)} placeholder="Nombre completo" /></Field>}
        <Row label="Importe total" value={totalImporte} bold />
        <Button className="w-full mt-2" onClick={addVenta}>Registrar venta</Button>
      </Card>
      {truck.currentDay.ventas.length === 0 ? <div className="text-center text-[#5A6570] text-sm py-4">Sin registros hoy</div> : (
        <Card>
          <div className="text-[11px] uppercase tracking-widest text-[#8B95A1] mb-2 font-medium">Registrado hoy</div>
          {[...truck.currentDay.ventas].reverse().map(item => (
            editId === item.id
              ? <VentaEditForm key={item.id} item={item} truck={truck} truckId={truckId} mutate={mutate} toast={toast} onDone={() => setEditId(null)} />
              : <ItemRow key={item.id} onEdit={() => setEditId(item.id)} onDelete={() => deleteVenta(item)}>
                  <div className="text-sm text-[#ADB4BC] font-mono">
                    <div>{fmt(item.litros)} L — total ${fmt(item.efectivo + item.transferencia + item.credito)}</div>
                    <div className="text-xs text-[#5A6570]">
                      {item.efectivo > 0 && `Efvo $${fmt(item.efectivo)} `}{item.transferencia > 0 && `Transf $${fmt(item.transferencia)} `}{item.credito > 0 && `Créd $${fmt(item.credito)} (${item.cliente})`}
                    </div>
                  </div>
                </ItemRow>
          ))}
        </Card>
      )}
    </div>
  );
}

function VentaEditForm({ item, truck, truckId, mutate, toast, onDone }) {
  const [litros, setLitros] = useState(item.litros);
  const [efectivo, setEfectivo] = useState(item.efectivo);
  const [transferencia, setTransferencia] = useState(item.transferencia);
  const [credito, setCredito] = useState(item.credito);
  const [cliente, setCliente] = useState(item.cliente || "");
  const disponibleParaEsto = truck.inventory.litros + item.litros;

  const guardar = () => {
    const nuevoLitros = Number(litros);
    if (nuevoLitros > disponibleParaEsto) { toast(`Solo hay ${fmt(disponibleParaEsto)} L disponibles`); return; }
    if (Number(credito) > 0 && !cliente.trim()) { toast("Falta el nombre del cliente para la parte a crédito"); return; }
    mutate(d => {
      const t = d.trucks.find(x => x.id === truckId);
      const v = t.currentDay.ventas.find(x => x.id === item.id);
      if (!v) return;
      t.inventory.litros += v.litros - nuevoLitros;
      v.litros = nuevoLitros; v.efectivo = Number(efectivo) || 0; v.transferencia = Number(transferencia) || 0; v.credito = Number(credito) || 0;
      v.cliente = Number(credito) > 0 ? cliente.trim() : null;
      d.receivables = d.receivables.filter(r => r.sourceTs !== item.ts);
      if (Number(credito) > 0) d.receivables.push({ id: makeId(), truckId, sourceTs: item.ts, cliente: cliente.trim(), monto: Number(credito), fecha: t.currentDay.fecha, pagado: false });
    });
    toast("Venta actualizada"); onDone();
  };

  return (
    <div className="pb-2 mb-2 border-b border-[#2A323A] last:border-0">
      <div className="grid grid-cols-2 gap-2 mb-2">
        <div><span className="block text-[10px] uppercase text-[#8B95A1] mb-1">Litros</span><input type="number" className={inputSmCls} value={litros} onChange={e => setLitros(e.target.value)} /></div>
        <div><span className="block text-[10px] uppercase text-[#8B95A1] mb-1">Efectivo</span><input type="number" className={inputSmCls} value={efectivo} onChange={e => setEfectivo(e.target.value)} /></div>
        <div><span className="block text-[10px] uppercase text-[#8B95A1] mb-1">Transferencia</span><input type="number" className={inputSmCls} value={transferencia} onChange={e => setTransferencia(e.target.value)} /></div>
        <div><span className="block text-[10px] uppercase text-[#8B95A1] mb-1">Crédito</span><input type="number" className={inputSmCls} value={credito} onChange={e => setCredito(e.target.value)} /></div>
      </div>
      {Number(credito) > 0 && <div className="mb-2"><span className="block text-[10px] uppercase text-[#8B95A1] mb-1">Cliente</span><input type="text" className={inputSmCls} value={cliente} onChange={e => setCliente(e.target.value)} /></div>}
      <div className="flex gap-2"><Button variant="ghost" className="flex-1 !py-1.5 !text-xs" onClick={onDone}>Cancelar</Button><Button className="flex-1 !py-1.5 !text-xs" onClick={guardar}>Guardar</Button></div>
    </div>
  );
}

function TabVehiculo({ truck, truckId, mutate, toast }) {
  const [form, setForm] = useState(truck.vehicle);
  const cap = Number(truck.vehicle.capacidadTanque) || 0;
  const pct = cap > 0 ? (truck.inventory.litros / cap) * 100 : 0;

  const guardar = () => {
    mutate(d => {
      const t = d.trucks.find(x => x.id === truckId);
      const capAnterior = Number(t.vehicle.capacidadTanque) || 0;
      t.vehicle = form;
      if (!capAnterior && Number(form.capacidadTanque) > 0) t.inventory.litros = Number(form.capacidadTanque);
    });
    toast("Configuración guardada");
  };

  return (
    <div className="space-y-3">
      <Card><GaugeBar pct={pct} label="Inventario de agua" sub={`${fmt(truck.inventory.litros)} L / ${fmt(cap)} L`} /></Card>
      <Card>
        <Row label="Km acumulados (estimado)" value={truck.kmAcumulados || 0} />
        <div className="text-xs text-[#5A6570] mt-1">Se calcula automáticamente: litros de gasóleo comprados × índice de consumo.</div>
      </Card>
      <Card>
        <div className="text-[11px] uppercase tracking-widest text-[#8B95A1] mb-3 font-medium">Expediente técnico</div>
        <Field label="Matrícula"><input className={inputCls} value={form.matricula} onChange={e => setForm(f => ({ ...f, matricula: e.target.value }))} placeholder="Ej. A123456" /></Field>
        <Field label="Índice de consumo (km/L)"><input type="number" className={inputCls} value={form.indiceConsumo} onChange={e => setForm(f => ({ ...f, indiceConsumo: e.target.value }))} placeholder="0.0" /></Field>
        <Field label="Capacidad del tanque (L)"><input type="number" className={inputCls} value={form.capacidadTanque} onChange={e => setForm(f => ({ ...f, capacidadTanque: e.target.value }))} placeholder="0" /></Field>
        <Button className="w-full" onClick={guardar}>Guardar configuración</Button>
      </Card>
    </div>
  );
}

function submayorTotal(m) {
  const reg = m.registros.reduce((a, r) => a + Number(r.importe || 0), 0);
  const neu = m.neumaticos.reduce((a, n) => a + Number(n.importe || 0), 0);
  const bat = m.bateria.reduce((a, b) => a + Number(b.importe || 0), 0);
  return { reg, neu, bat, total: reg + neu + bat };
}

function MantenimientoTodos({ data }) {
  let granTotal = 0;
  const porCamion = data.trucks.map(t => {
    const tot = submayorTotal(t.maintenance);
    granTotal += tot.total;
    return { nombre: t.nombre, total: tot.total };
  });

  const alertasTodas = [];
  data.trucks.forEach(t => {
    const km = t.kmAcumulados || 0;
    t.maintenance.tiposCatalogo.forEach(tipo => {
      const regsTipo = t.maintenance.registros.filter(r => r.tipoId === tipo.id);
      const ultimo = regsTipo.length ? regsTipo.reduce((a, b) => (a.km > b.km ? a : b)) : null;
      const lastKm = ultimo ? ultimo.km : 0;
      const objetivo = lastKm + tipo.intervaloKm;
      const restante = objetivo - km;
      if (restante <= 500) alertasTodas.push({ truckNombre: t.nombre, tipoNombre: tipo.nombre, restante, vencido: restante < 0 });
    });
  });
  alertasTodas.sort((a, b) => a.restante - b.restante);

  return (
    <div className="space-y-3">
      <Card>
        <div className="text-[11px] uppercase tracking-widest text-[#8B95A1] mb-2 font-medium">Submayor de mantenimiento — toda la flota</div>
        {porCamion.map(c => <Row key={c.nombre} label={c.nombre} value={c.total} />)}

function MantAlertas({ truck, truckId, mutate, toast }) {
  const { tiposCatalogo, registros } = truck.maintenance;
  const km = truck.kmAcumulados || 0;
  const [nombre, setNombre] = useState("");
  const [intervalo, setIntervalo] = useState("");

  const addTipo = () => {
    if (!nombre.trim() || !intervalo) { toast("Completa nombre e intervalo"); return; }
    mutate(d => { d.trucks.find(x => x.id === truckId).maintenance.tiposCatalogo.push({ id: makeId(), nombre: nombre.trim(), intervaloKm: Number(intervalo) }); });
    setNombre(""); setIntervalo(""); toast("Tipo de mantenimiento agregado");
  };
  const deleteTipo = (id) => {
    mutate(d => { const t = d.trucks.find(x => x.id === truckId); t.maintenance.tiposCatalogo = t.maintenance.tiposCatalogo.filter(x => x.id !== id); });
    toast("Tipo eliminado");
  };

  return (
    <div className="space-y-3">
      {tiposCatalogo.map(tipo => {
        const regsTipo = registros.filter(r => r.tipoId === tipo.id);
        const ultimo = regsTipo.length ? regsTipo.reduce((a, b) => (a.km > b.km ? a : b)) : null;
        const lastKm = ultimo ? ultimo.km : 0;
        const objetivo = lastKm + tipo.intervaloKm;
        const restante = objetivo - km;
        const urgente = restante <= 500;
        const vencido = restante < 0;
        return (
          <Card key={tipo.id} className={urgente ? "border-[#D14B3D]" : ""}>
            <div className="flex items-start justify-between">
              <div>
                <div className="text-sm font-semibold text-[#ECE9E2]">{tipo.nombre}</div>
                <div className="text-xs text-[#5A6570]">Cada {fmt(tipo.intervaloKm)} km · último cambio: {fmt(lastKm)} km</div>
              </div>
              {urgente && <span className={`flex items-center gap-1 text-[10px] font-bold uppercase px-2 py-1 rounded-sm ${vencido ? "bg-[#D14B3D] text-white" : "bg-[#F5A623] text-[#171B1F]"}`}><AlertTriangle size={12} /> {vencido ? "Vencido" : "Próximo"}</span>}
            </div>
            <div className="mt-2"><Row label="Objetivo" value={objetivo} muted /><Row label="Restante" value={restante} bold={urgente} /></div>
          </Card>
        );
      })}
      <Card>
        <div className="text-[11px] uppercase tracking-widest text-[#8B95A1] mb-2 font-medium">Agregar tipo de mantenimiento</div>
        <div className="grid grid-cols-2 gap-2 mb-2">
          <input className={inputSmCls} placeholder="Nombre" value={nombre} onChange={e => setNombre(e.target.value)} />
          <input type="number" className={inputSmCls} placeholder="Intervalo km" value={intervalo} onChange={e => setIntervalo(e.target.value)} />
        </div>
        <Button className="w-full" onClick={addTipo}>Agregar</Button>
        <div className="mt-3 space-y-1">
          {tiposCatalogo.map(t => (
            <div key={t.id} className="flex justify-between items-center text-xs text-[#8B95A1]">
              <span>{t.nombre} ({fmt(t.intervaloKm)} km)</span>
              <DeleteConfirm onConfirm={() => deleteTipo(t.id)} />
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

// ---------- FINANZAS (agregado de todos los camiones) ----------
function TabFinanzas({ data, mutate, toast }) {
  const [sub, setSub] = useState("resumen");
  let ingresos = 0, compras = 0, gastosVarios = 0, mantenimiento = 0;
  data.trucks.forEach(truck => {
    const dias = [...truck.history, truck.currentDay];
    dias.forEach(d => {
      ingresos += d.ventas.reduce((a, v) => a + Number(v.efectivo || 0) + Number(v.transferencia || 0) + Number(v.credito || 0), 0);
      compras += d.compras.reduce((a, c) => a + Number(c.valor || 0), 0);
      gastosVarios += d.gastos.reduce((a, g) => a + Number(g.monto || 0), 0);
    });
    mantenimiento += submayorTotal(truck.maintenance).total;
  });
  const gastosTotales = compras + gastosVarios + mantenimiento;
  const utilidad = ingresos - gastosTotales;
  const rentabilidad = ingresos > 0 ? (utilidad / ingresos) * 100 : 0;
  const porCobrar = data.receivables.filter(r => !r.pagado).reduce((a, r) => a + r.monto, 0);

  const efectivoDisponible = data.trucks.reduce((sum, truck) => {
    const day = truck.currentDay;
    return sum + day.saldoInicial + day.ventas.reduce((a, v) => a + Number(v.efectivo || 0), 0) - day.compras.reduce((a, c) => a + Number(c.valor || 0), 0) - day.gastos.reduce((a, g) => a + Number(g.monto || 0), 0);
  }, 0);

  const diasCerrados = data.trucks.reduce((a, t) => a + t.history.length, 0);
  const diasConActividad = Math.max(diasCerrados + data.trucks.length, 1);
  const promedioDiario = gastosTotales / diasConActividad;
  const diasCobertura = promedioDiario > 0 ? efectivoDisponible / promedioDiario : null;

  const [fondo, setFondo] = useState(data.finance.fondoCobertura);
  const disponiblePersonal = utilidad - Number(fondo || 0);
  const guardarFondo = () => { mutate(d => { d.finance.fondoCobertura = Number(fondo) || 0; }); toast("Fondo de cobertura actualizado"); };

  return (
    <div className="space-y-3">
      <div className="grid grid-cols-2 gap-1.5">

          </Card>

  );
}

function SimpleLineChart({ data, series }) {
  const width = 320, height = 220, padL = 34, padR = 8, padT = 10, padB = 20;
  const allVals = data.flatMap(d => series.map(s => d[s.key]));
  const maxVal = Math.max(1, ...allVals);
  const minVal = Math.min(0, ...allVals);
  const xStep = data.length > 1 ? (width - padL - padR) / (data.length - 1) : 0;
  const xScale = (i) => padL + i * xStep;
  const yScale = (v) => height - padB - ((v - minVal) / ((maxVal - minVal) || 1)) * (height - padT - padB);
  const gridLines = 4;
  return (
    <div>
      <svg viewBox={`0 0 ${width} ${height}`} className="w-full" style={{ maxHeight: 240 }}>
        {Array.from({ length: gridLines + 1 }).map((_, i) => {
          const y = padT + (i * (height - padT - padB)) / gridLines;
          return <line key={i} x1={padL} y1={y} x2={width - padR} y2={y} stroke="#2A323A" strokeDasharray="3 3" />;
        })}
        {series.map(s => (
          <polyline key={s.key} fill="none" stroke={s.color} strokeWidth="2"
            points={data.map((d, i) => `${xScale(i)},${yScale(d[s.key])}`).join(" ")} />
        ))}
        {series.map(s => data.map((d, i) => (
          <circle key={s.key + i} cx={xScale(i)} cy={yScale(d[s.key])} r="2.5" fill={s.color} />
        )))}
        {data.map((d, i) => (
          (data.length <= 8 || i === 0 || i === data.length - 1 || i % Math.ceil(data.length / 6) === 0) && (
            <text key={i} x={xScale(i)} y={height - 4} fontSize="8" fill="#8B95A1" textAnchor="middle">{d.fecha}</text>
          )
        ))}
      </svg>
      <div className="flex gap-4 justify-center mt-2">
        {series.map(s => (
          <div key={s.key} className="flex items-center gap-1.5 text-[11px] text-[#8B95A1]">
            <span className="w-2.5 h-2.5 rounded-full inline-block" style={{ background: s.color }} />{s.name}
          </div>
        ))}
      </div>
    </div>
  );
}

function FinanzasGrafico({ data }) {
  const porFecha = {};
  data.trucks.forEach(truck => {
    truck.history.forEach(d => {
      const ingresos = d.ventas.reduce((a, v) => a + Number(v.efectivo || 0) + Number(v.transferencia || 0) + Number(v.credito || 0), 0);
      const gastos = d.compras.reduce((a, c) => a + Number(c.valor || 0), 0) + d.gastos.reduce((a, g) => a + Number(g.monto || 0), 0);
      if (!porFecha[d.fecha]) porFecha[d.fecha] = { fecha: d.fecha, ingresos: 0, gastos: 0 };
      porFecha[d.fecha].ingresos += ingresos;
      porFecha[d.fecha].gastos += gastos;
    });
  });
  const chartData = Object.values(porFecha).sort((a, b) => a.fecha.localeCompare(b.fecha)).map(d => ({ ...d, fecha: d.fecha.slice(5), utilidad: d.ingresos - d.gastos }));

  if (chartData.length < 2) return <Card><div className="text-center text-[#5A6570] text-sm py-6">Cierra al menos 2 días (en cualquier camión) para ver el gráfico de evolución del negocio.</div></Card>;

  return (
    <Card>
      <div className="text-[11px] uppercase tracking-widest text-[#8B95A1] mb-3 font-medium">Evolución del negocio (todos los camiones)</div>
      <SimpleLineChart data={chartData} series={[
        { key: "ingresos", name: "Ingresos", color: "#4C8C5B" },
        { key: "gastos", name: "Gastos", color: "#D14B3D" },
        { key: "utilidad", name: "Utilidad", color: "#F5A623" },
      ]} />
    </Card>
  );
}

function TabCobrar({ data, mutate, toast }) {
  const pendientes = data.receivables.filter(r => !r.pagado);
  const total = pendientes.reduce((a, r) => a + r.monto, 0);
  const nombreCamion = (id) => data.trucks.find(t => t.id === id)?.nombre || "";
  const marcarPagado = (id) => { mutate(d => { const r = d.receivables.find(x => x.id === id); if (r) r.pagado = true; }); toast("Marcado como pagado"); };
  return (
    <div className="space-y-3">
      <Card><Row label="Total pendiente" value={total} bold /></Card>
      {pendientes.length === 0 ? <div className="text-center text-[#5A6570] text-sm py-4">No hay cuentas por cobrar</div> : (
        <Card>
          <div className="space-y-2">
            {pendientes.map((r) => (
              <div key={r.id} className="flex items-center justify-between border-b border-[#2A323A] pb-2 last:border-0">
                <div>
                  <div className="text-sm text-[#ECE9E2]">{r.cliente}</div>
                  <div className="text-xs text-[#5A6570] font-mono">{r.fecha} — ${fmt(r.monto)} · {nombreCamion(r.truckId)}</div>
                </div>
                <Button variant="secondary" onClick={() => marcarPagado(r.id)}>Pagó</Button>
              </div>
            ))}
          </div>
        </Card>
      )}
    </div>
  );
}

function TabHistorial({ data, truckId }) {
  const [vista, setVista] = useState("camion");
  const truck = data.trucks.find(t => t.id === truckId);

  const todas = [];
  data.trucks.forEach(t => t.history.forEach(d => todas.push({ ...d, truckNombre: t.nombre })));
  todas.sort((a, b) => (b.cerradoTs || 0) - (a.cerradoTs || 0));

  const porCamion = {};
  const porChofer = {};
  let totalGeneral = 0;
  todas.forEach(d => {
    const monto = Number(d.entregadoAlDueno || 0);
    totalGeneral += monto;
    porCamion[d.truckNombre] = (porCamion[d.truckNombre] || 0) + monto;
    const chofer = d.choferNombre || "Sin identificar";
    porChofer[chofer] = (porChofer[chofer] || 0) + monto;
  });

  return (
    <div className="space-y-3">
      <div className="grid grid-cols-2 gap-1.5">
        <button onClick={() => setVista("camion")} className={`py-2 rounded-sm text-xs font-medium tracking-wide transition ${vista === "camion" ? "bg-[#2E6E8E] text-white" : "bg-[#1E252B] text-[#8B95A1] border border-[#2A323A]"}`}>Este camión</button>
        <button onClick={() => setVista("todos")} className={`py-2 rounded-sm text-xs font-medium tracking-wide transition ${vista === "todos" ? "bg-[#2E6E8E] text-white" : "bg-[#1E252B] text-[#8B95A1] border border-[#2A323A]"}`}>Todos</button>
      </div>

      {vista === "camion" && (
        !truck || truck.history.length === 0 ? <div className="text-center text-[#5A6570] text-sm py-4">Aún no hay días cerrados</div> : (
          <div className="space-y-2">
            {truck.history.map((d, i) => (
              <Card key={i}>
                <div className="flex justify-between items-center mb-1">
                  <span className="text-sm font-semibold text-[#ECE9E2]">{d.fecha}</span>
                  <span className="font-mono text-sm text-[#F5A623]">${fmt(d.entregadoAlDueno)}</span>
                </div>
                <div className="text-xs text-[#5A6570]">{d.choferNombre ? `Liquidado por ${d.choferNombre} · ` : ""}{d.ventas.length} ventas · {d.gastos.length} gastos</div>
              </Card>
            ))}
          </div>
        )
      )}

      {vista === "todos" && (
        todas.length === 0 ? <div className="text-center text-[#5A6570] text-sm py-4">Aún no hay días cerrados en ningún camión</div> : (
          <>
            <Card><Row label="Total liquidado (todos)" value={totalGeneral} bold /></Card>
            <Card>
              <div className="text-[11px] uppercase tracking-widest text-[#8B95A1] mb-2 font-medium">Por camión</div>
              {Object.entries(porCamion).map(([nombre, monto]) => <Row key={nombre} label={nombre} value={monto} />)}
            </Card>
            <Card>
              <div className="text-[11px] uppercase tracking-widest text-[#8B95A1] mb-2 font-medium">Por chofer</div>
              {Object.entries(porChofer).map(([nombre, monto]) => <Row key={nombre} label={nombre} value={monto} />)}
            </Card>
            <Card>
              <div className="text-[11px] uppercase tracking-widest text-[#8B95A1] mb-2 font-medium">Detalle cronológico</div>
              <div className="space-y-2">
                {todas.map((d, i) => (
                  <div key={i} className="border-b border-[#2A323A] pb-2 last:border-0 last:pb-0">
                    <div className="flex justify-between items-center">
                      <span className="text-sm text-[#ECE9E2]">{d.fecha} — {d.truckNombre}</span>
                      <span className="font-mono text-sm text-[#F5A623]">${fmt(d.entregadoAlDueno)}</span>
                    </div>
                    <div className="text-xs text-[#5A6570]">{d.choferNombre || "Sin identificar"}</div>
                  </div>
                ))}
              </div>
            </Card>
          </>
        )
      )}
    </div>
  );
}

// ---------- CAMIONES Y USUARIOS (admin) ----------
function TabCamiones({ data, mutate, toast }) {
  const [nombreCamion, setNombreCamion] = useState("");
  const [nombreChofer, setNombreChofer] = useState("");
  const [usernameChofer, setUsernameChofer] = useState("");
  const [passwordChofer, setPasswordChofer] = useState("");
  const [truckChofer, setTruckChofer] = useState(data.trucks[0]?.id || "");

  const addCamion = () => {
    if (!nombreCamion.trim()) { toast("Ingresa un nombre para el camión"); return; }
    mutate(d => { d.trucks.push(newTruck(nombreCamion.trim())); });
    setNombreCamion(""); toast("Camión agregado");
  };
  const deleteCamion = (id) => {
    mutate(d => {
      d.trucks = d.trucks.filter(t => t.id !== id);
      d.users.forEach(u => { if (u.truckId === id) u.truckId = null; });
    });
    toast("Camión eliminado");
  };
  const addChofer = () => {
    if (!nombreChofer.trim() || !usernameChofer.trim() || !passwordChofer) { toast("Completa todos los campos"); return; }
    if (data.users.some(u => u.username === usernameChofer.trim())) { toast("Ese usuario ya existe"); return; }
    mutate(d => { d.users.push({ id: makeId(), username: usernameChofer.trim(), password: passwordChofer, role: "chofer", nombre: nombreChofer.trim(), truckId: truckChofer || null }); });
    setNombreChofer(""); setUsernameChofer(""); setPasswordChofer(""); toast("Chofer agregado");
  };
  const deleteChofer = (id) => { mutate(d => { d.users = d.users.filter(u => u.id !== id); }); toast("Chofer eliminado"); };

  const choferes = data.users.filter(u => u.role === "chofer");
  const nombreCamionDe = (id) => data.trucks.find(t => t.id === id)?.nombre || "— sin asignar —";

  return (
    <div className="space-y-3">
      <Card>
        <div className="text-[11px] uppercase tracking-widest text-[#8B95A1] mb-2 font-medium">Camiones</div>
        <div className="space-y-1.5 mb-3">
          {data.trucks.map(t => (
            <div key={t.id} className="flex justify-between items-center text-sm text-[#ADB4BC] border-b border-[#2A323A] pb-1.5 last:border-0">
              <span>{t.nombre} {t.vehicle.matricula && `(${t.vehicle.matricula})`}</span>
              <DeleteConfirm onConfirm={() => deleteCamion(t.id)} />
            </div>
          ))}
        </div>
        <div className="flex gap-2">
          <input className={inputSmCls} placeholder="Nombre del camión" value={nombreCamion} onChange={e => setNombreCamion(e.target.value)} />
          <Button onClick={addCamion} className="shrink-0">Agregar</Button>
        </div>
      </Card>

      <Card>
        <div className="text-[11px] uppercase tracking-widest text-[#8B95A1] mb-2 font-medium">Choferes</div>
        <div className="space-y-1.5 mb-3">
          {choferes.map(u => (
            <div key={u.id} className="flex justify-between items-center text-sm text-[#ADB4BC] border-b border-[#2A323A] pb-1.5 last:border-0">
              <div><div>{u.nombre} <span className="text-[#5A6570]">({u.username})</span></div><div className="text-xs text-[#5A6570]">{nombreCamionDe(u.truckId)}</div></div>
              <DeleteConfirm onConfirm={() => deleteChofer(u.id)} />
            </div>
          ))}
        </div>
        <div className="grid grid-cols-2 gap-2 mb-2">
          <input className={inputSmCls} placeholder="Nombre" value={nombreChofer} onChange={e => setNombreChofer(e.target.value)} />
          <input className={inputSmCls} placeholder="Usuario" value={usernameChofer} onChange={e => setUsernameChofer(e.target.value)} />
        </div>
        <div className="grid grid-cols-2 gap-2 mb-2">
          <input type="password" className={inputSmCls} placeholder="Contraseña" value={passwordChofer} onChange={e => setPasswordChofer(e.target.value)} />
          <select className={inputSmCls} value={truckChofer} onChange={e => setTruckChofer(e.target.value)}>
            {data.trucks.map(t => <option key={t.id} value={t.id}>{t.nombre}</option>)}
          </select>
        </div>
        <Button className="w-full" onClick={addChofer}>Agregar chofer</Button>
      </Card>
    </div>
  );
}

// ---------- APP ----------
function App() {
  const [data, setData] = useState(null);
  const [currentUser, setCurrentUser] = useState(null);
  const [toastMsg, setToastMsg] = useState("");

  useEffect(() => {
    loadData().then(setData);
    const unsubscribe = subscribeToChanges(setData);
    return unsubscribe;
  }, []);

  const toast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(""), 2400); }, []);
  const mutate = useCallback((fn) => {
    setData(prev => { const next = JSON.parse(JSON.stringify(prev)); fn(next); saveData(next); return next; });
  }, []);

  if (!data) return <div className="min-h-screen bg-[#171B1F] flex items-center justify-center text-[#8B95A1] font-mono text-sm">Cargando…</div>;
  if (!currentUser) return <LoginScreen data={data} onLogin={setCurrentUser} />;

  const truck = currentUser.role === "chofer" ? data.trucks.find(t => t.id === currentUser.truckId) : null;

  return (
    <div className="min-h-screen bg-[#171B1F] text-[#ECE9E2]" style={{ fontFamily: "'Inter', sans-serif" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap'); .font-mono{font-family:'IBM Plex Mono',monospace;}`}</style>
      <header className="border-b border-[#2A323A] px-4 py-4 sticky top-0 bg-[#171B1F]/95 backdrop-blur z-10">
        <div className="max-w-md mx-auto flex items-center justify-between">
          <div className="flex items-center gap-2">
            <div className="w-2 h-2 rounded-full bg-[#F5A623]" />
            <div>
              <h1 className="text-base font-bold tracking-tight leading-none" style={{ fontFamily: "'Oswald', sans-serif" }}>CONTROL DE RUTA</h1>
              <div className="text-[11px] text-[#8B95A1] mt-0.5">{currentUser.nombre} · {currentUser.role === "dueno" ? "Dueño" : truck?.nombre || "Sin camión"}</div>
            </div>
          </div>
          <button onClick={() => setCurrentUser(null)} className="text-[#8B95A1] hover:text-[#ECE9E2] flex items-center gap-1 text-xs"><LogOut size={14} /> Salir</button>
        </div>
      </header>
      <main className="px-4 py-4">
        {currentUser.role === "chofer"
          ? (truck ? <PanelChofer truck={truck} truckId={truck.id} mutate={mutate} toast={toast} currentUser={currentUser} /> : <div className="text-center text-[#D14B3D] text-sm py-8">Tu camión ya no está asignado. Contacta al dueño.</div>)
          : <PanelDueno data={data} mutate={mutate} toast={toast} />}
      </main>
      <Toast msg={toastMsg} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
